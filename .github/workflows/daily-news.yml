name: Daily Education News

on:
  schedule:
    # 00:00 UTC daily = 08:00 SGT / MYT / CST
    # Note: GitHub only runs scheduled workflows on the default branch.
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [claude/education-news-scraper-1tuyv]
    paths:
      - 'scripts/**'
      - '.github/workflows/daily-news.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/news_scraper.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain news.html)" ]]; then
            git add news.html
            git commit -m "chore(news): daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "news.html unchanged, nothing to commit."
          fi
